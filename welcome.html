    <div class="app-container" style="padding-bottom: 20px;">

    <script src="assets/app.js"></script>
    <script>
        function selectCity(city) {
            const card = document.querySelector('.active-city');
            if (card) {
                card.style.transform = 'scale(0.96)';
            }
            setSelectedCity(city);
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 180);
        }

        // Live search filter
        document.getElementById('city-search').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const items = document.querySelectorAll('.city-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(term)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
